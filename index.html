<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body{
    margin:0;
    height:100vh;
    background:url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3");
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.box{
    width:330px;
    padding:30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    text-align:center;
}

h2{
    color:white;
}

input{
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button{
    width:95%;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#00e5ff;
    font-size:17px;
}

a{
    color:#00e5ff;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<p>
<a href="forgot.html">Forgot Password?</a>
</p>

<p>
New User?
<a href="registration.html">Register</a>
</p>

</form>

</div>

</body>
</html>
