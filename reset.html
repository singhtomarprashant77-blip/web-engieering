<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<style>

body{
margin:0;
height:100vh;
background:url("https://images.unsplash.com/photo-1497366754035-f200968a6e72");
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.box{
width:330px;
padding:30px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:20px;
text-align:center;
}

h2{
color:white;
}

input,button{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

button{
background:#00e5ff;
font-size:17px;
}

</style>

</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<input type="password" placeholder="New Password">

<input type="password" placeholder="Confirm Password">

<button>
Reset Password
</button>

</div>

</body>
</html>
